<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUIYE BIOTECH | 辉晔生物</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root { --accent: #00FF9D; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; margin: 0; }

        /* 极简导航 - 适配移动端 */
        nav { background: #000; border-bottom: 1px solid #111; }
        .logo-group { display: flex; align-items: center; gap: 8px; }
        .logo-img { height: 28px; width: auto; }

        /* 视频层优化 - 确保移动端可见 */
        .video-container { position: absolute; inset: 0; z-index: -1; background: #000; overflow: hidden; }
        .hero-video { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0.5;
            /* 某些安卓机会给视频加默认边框，此处清除 */
            border: none;
        }

        /* 移动端文字自适应 */
        @media (max-width: 640px) {
            .hero-title { font-size: 3rem !important; }
            .hero-sub { font-size: 0.75rem !important; letter-spacing: 0.3em !important; }
        }

        .reveal { opacity: 0; transform: translateY(15px); will-change: transform, opacity; }
        .prod-img { width: 100%; max-width: 550px; height: auto; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 px-4 md:px-6 py-4 flex justify-between items-center">
        <div class="logo-group">
            < img src="logo.png" alt="" class="logo-img">
            <div class="flex flex-col border-l border-zinc-800 pl-2 md:pl-3">
                <span class="text-sm md:text-lg font-black tracking-tighter leading-none">HUIYE BIOTECH</span>
                <span class="text-[7px] md:text-[9px] text-zinc-600 uppercase mt-1">辉晔生物科技</span>
            </div>
        </div>
        <div class="flex gap-4 md:gap-8 text-[9px] md:text-[10px] font-bold text-zinc-500">
            <a href=" " class="hover:text-[#00FF9D]">TECH</a >
            <a href="#honor" class="hover:text-[#00FF9D]">HONOR</a >
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center">
        <div class="video-container">
            <video 
                id="bgVideo"
                autoplay 
                muted 
                loop 
                playsinline 
                webkit-playsinline
                x5-playsinline
                poster="p_exterior.webp" 
                class="hero-video">
                <source src="hero_video.mp4" type="video/mp4">
                您的浏览器不支持视频播放。
            </video>
        </div>
        <div class="relative z-10 text-center px-4">
            <h1 class="hero-title text-5xl md:text-8xl font-black italic tracking-tighter">HUIYE BIOTECH</h1>
            <p class="hero-sub text-zinc-500 tracking-[0.6em] mt-4 uppercase text-sm">芯呼智诊 · 掌上健康方案</p >
        </div>
    </section>

    <section id="tech" class="py-20 md:py-24 px-6 md:px-10 max-w-6xl mx-auto reveal">
        <div class="grid md:grid-cols-2 gap-10 md:gap-12 items-center">
            <div class="space-y-6">
                <h2 class="text-4xl md:text-5xl font-black italic">RPA-CRISPR</h2>
                <p class="text-zinc-500 text-base md:text-lg">15分钟极速判读，fM级超高灵敏度。单步集成设计，让精准检测回归掌心。</p >
            </div>
            <div class="flex justify-center">
                < img src="p_exterior.webp" class="prod-img" alt="Product">
            </div>
        </div>
    </section>

    <section id="honor" class="py-20 md:py-24 px-6 md:px-10 max-w-4xl mx-auto reveal">
        <div class="border-t border-zinc-900 pt-10">
            <h3 class="text-zinc-800 text-center font-black tracking-widest mb-10 uppercase italic">// Achievements</h3>
            <div class="space-y-4">
                <div class="p-5 bg-zinc-900/20 border-l-2 border-[#00FF9D]">
                    <div class="font-bold text-sm md:text-base">国家级大创项目 · 优秀立项</div>
                    <div class="text-[10px] md:text-xs text-zinc-600 mt-1">2024 - 创新创业项目核心成员</div>
                </div>
            </div>
        </div>
    </section>

            var video = document.getElementById('bgVideo');
            // 尝试再次触发播放，解决部分安卓机首次加载不播放问题

                console.log("自动播放被拦截，通常是因为省电模式");
            });
        });
